name: Release

# Push a semver tag (e.g. `v1.1.0`) to cut a release: this cross-compiles the
# sidecar, builds the distribution artifact, and publishes it as release assets
# for the CaeloWorks update site to ingest.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: sidecar/go.mod
          cache-dependency-path: sidecar/go.sum
      - name: Version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Cross-compile the sidecar (all OSes)
        run: bash scripts/build-sidecar.sh
      - name: Build the distribution artifact
        run: bash scripts/build-update-package.sh "${{ steps.v.outputs.version }}"
      - name: Publish release + assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Distributed WBPP $GITHUB_REF_NAME" \
            --generate-notes \
            "dist/DistributedWBPP-${{ steps.v.outputs.version }}.zip" \
            "dist/update-package.json"
