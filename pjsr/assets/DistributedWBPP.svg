<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Distributed WBPP">
  <!-- Distributed WBPP : un noyau, quatre machines. Silhouette radiale, unique
       dans la famille. Le noyau cyan porte l'accent CaeloWorks. -->
  <defs>
    <linearGradient id="dwbppTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111c33"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="dwbppHub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#dwbppTile)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="13.25" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- liens vers les noeuds -->
  <g stroke="#475569" stroke-width="4" stroke-linecap="round">
    <line x1="32" y1="32" x2="17" y2="17"/>
    <line x1="32" y1="32" x2="47" y2="17"/>
    <line x1="32" y1="32" x2="17" y2="47"/>
    <line x1="32" y1="32" x2="47" y2="47"/>
  </g>

  <!-- machines du cluster -->
  <g fill="#94a3b8">
    <circle cx="17" cy="17" r="6"/>
    <circle cx="47" cy="17" r="6"/>
    <circle cx="17" cy="47" r="6"/>
    <circle cx="47" cy="47" r="6"/>
  </g>

  <!-- noeud principal -->
  <circle cx="32" cy="32" r="11" fill="url(#dwbppHub)"/>
  <circle cx="32" cy="32" r="4.2" fill="#04121f"/>
</svg>
