<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Distributed-WBPP: hub-and-spoke cluster (central server + workers) -->
  <!-- links -->
  <g stroke="#64748b" stroke-width="3.5" stroke-linecap="round">
    <line x1="32" y1="32" x2="15" y2="16"/>
    <line x1="32" y1="32" x2="49" y2="16"/>
    <line x1="32" y1="32" x2="14" y2="49"/>
    <line x1="32" y1="32" x2="50" y2="49"/>
  </g>
  <!-- worker nodes -->
  <g fill="#3b82f6" stroke="#1e3a8a" stroke-width="1.6">
    <circle cx="15" cy="16" r="6.5"/>
    <circle cx="49" cy="16" r="6.5"/>
    <circle cx="14" cy="49" r="6.5"/>
    <circle cx="50" cy="49" r="6.5"/>
  </g>
  <!-- central server node -->
  <circle cx="32" cy="32" r="10.5" fill="#f59e0b" stroke="#b45309" stroke-width="1.8"/>
  <circle cx="32" cy="32" r="4" fill="#fff7ed"/>
</svg>
